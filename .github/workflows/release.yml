# =============================================================================
# Release the standalone `cockroach-cli` binary on a v* tag.
#
# Cross-compiles the CLI for every OS/arch, attaches archives + checksums to
# the GitHub Release, and bumps the Homebrew tap formula. Driven by
# .goreleaser.yaml.
#
# ── Required secrets ─────────────────────────────────────────────────────────
#   GITHUB_TOKEN               Auto-provided by Actions. Used to create/update
#                              the GitHub Release and upload the archives +
#                              checksums. Needs `contents: write` (granted below).
#   HOMEBREW_TAP_GITHUB_TOKEN  A PAT (classic or fine-grained) with `contents:
#                              write` on github.com/cockroachnetworkorg/homebrew-tap.
#                              GoReleaser uses it to commit the updated formula to
#                              that DIFFERENT repo — GITHUB_TOKEN can't push there.
#   SCOOP_BUCKET_GITHUB_TOKEN  A PAT with `contents: write` on
#                              github.com/cockroachnetworkorg/scoop-bucket. Commits
#                              the Scoop manifest bump to that DIFFERENT repo.
#   WINGET_PKGS_GITHUB_TOKEN   A PAT with `contents: write` on the fork
#                              github.com/cockroachnetworkorg/winget-pkgs +
#                              permission to open a PR into microsoft/winget-pkgs.
#
# ── Prerequisites ────────────────────────────────────────────────────────────
#   - The tap repo  github.com/cockroachnetworkorg/homebrew-tap  must already
#     exist (create it empty). GoReleaser writes Formula/cockroach-cli.rb into it.
#   - The bucket repo  github.com/cockroachnetworkorg/scoop-bucket  must already
#     exist (create it empty). GoReleaser writes cockroach-cli.json into it.
#   - The fork  github.com/cockroachnetworkorg/winget-pkgs  (a fork of
#     microsoft/winget-pkgs) must already exist; GoReleaser commits the manifest
#     there and opens a PR into the upstream microsoft/winget-pkgs.
#   (Each of the three package-manager blocks is independent: a missing token
#    only skips its own publish — the GitHub Release + archives still ship. See
#    .goreleaser.yaml for the per-block setup + the winget manual-PR fallback.)
# =============================================================================
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release + upload archives/checksums

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: GoReleaser (cockroach-cli)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # GoReleaser needs full history + tags to compute the changelog and
      # resolve the previous tag.
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Match go.mod's toolchain (go 1.25.0).
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: go.sum

      # Preflight: GoReleaser pushes the brew/scoop/winget bumps to SEPARATE repos
      # AFTER it has already created the GitHub Release + uploaded archives. If a
      # tap repo is missing, the release publishes half-way (Release exists, formula
      # push 404s) — a confusing partial state. Fail FAST here instead, but ONLY for
      # the targets whose token secret is set (an unset token = that block is a no-op
      # in .goreleaser.yaml, so a fork not using it must not be blocked).
      - name: Preflight — package-manager tap repos exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # gh api auth (read-only repo lookups)
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
          WINGET_PKGS_GITHUB_TOKEN: ${{ secrets.WINGET_PKGS_GITHUB_TOKEN }}
        run: |
          fail=0
          # check_repo <token> <owner/repo> <secret-name> — only enforced when the
          # token is set (else GoReleaser skips that publish anyway).
          check_repo() {
            local token="$1" repo="$2" secret="$3"
            [ -z "$token" ] && { echo "· $secret unset → skipping $repo publish (not enforced)."; return; }
            if gh api "repos/$repo" --silent 2>/dev/null; then
              echo "✓ $repo exists."
            else
              echo "::error title=Missing tap repo::$secret is set but $repo does not exist (or the token can't see it). GoReleaser would create the GitHub Release, then fail pushing the bump → a half-published release. Create $repo (empty is fine) or unset $secret, then re-run."
              fail=1
            fi
          }
          check_repo "$HOMEBREW_TAP_GITHUB_TOKEN" "cockroachnetworkorg/homebrew-tap" "HOMEBREW_TAP_GITHUB_TOKEN"
          check_repo "$SCOOP_BUCKET_GITHUB_TOKEN" "cockroachnetworkorg/scoop-bucket"  "SCOOP_BUCKET_GITHUB_TOKEN"
          # winget commits to the org's FORK of microsoft/winget-pkgs (see .goreleaser.yaml).
          check_repo "$WINGET_PKGS_GITHUB_TOKEN"  "cockroachnetworkorg/winget-pkgs"  "WINGET_PKGS_GITHUB_TOKEN"
          exit $fail

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pushes the formula bump to the separate homebrew-tap repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          # Pushes the Scoop manifest bump to the separate scoop-bucket repo.
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}
          # Commits the winget manifest to the winget-pkgs fork + opens the upstream PR.
          WINGET_PKGS_GITHUB_TOKEN: ${{ secrets.WINGET_PKGS_GITHUB_TOKEN }}
